<section class="border">
    <div class="contact-card">
        <div class="bg-blue-600 space-y-1 text-center text-white p-5 border border-zinc-300">
            <h3 class="font-extrabold text-xl pb-0.5">빠른 상담 예약</h3>
            <p class="font-bold text-gray-200 text-xs">상담 내용을 남겨주시면 확인 후 즉시 연락드리겠습니다.</p>
        </div>

        <form name="contact" id="contact-form"  class="!mx-6" netlify>
            <input type="hidden" name="form-name" value="contact" />
            <div class="form-group !mt-8">
                <label for="name">성함<span class="text-red-700 pl-0.5">*</span></label>
                <input type="text" id="name" name="name" placeholder="성함을 입력해 주세요." required>
            </div>

            <div class="form-group">
                <label for="phone">연락처<span class="text-red-700 pl-0.5">*</span></label>
                <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" required>
            </div>

            <div class="form-group">
                <label for="sido">주소<span class="text-red-700 pl-0.5">*</span></label>

                <div class="grid grid-cols-2 gap-2 mb-3">
                    <select id="sido" name="sido" class="border p-3 rounded-lg w-full outline-none"
                            onchange="updateSigungu()">
                        <option value="">시/도</option>
                        <option value="서울특별시">서울특별시</option>
                        <option value="경기도">경기도</option>
                        <option value="인천광역시">인천광역시</option>
                        <option value="전라북도">전라북도</option>
                        <option value="전라남도">전라남도</option>
                        <option value="강원도">강원도</option>
                        <option value="충청북도">충청북도</option>
                        <option value="충청남도">충청남도</option>
                        <option value="경상북도">경상북도</option>
                        <option value="경상남도">경상남도</option>
                        <option value="울산광역시">울산광역시</option>
                        <option value="부산광역시">부산광역시</option>
                        <option value="대구광역시">대구광역시</option>
                        <option value="제주특별자치도">제주특별자치도</option>
                    </select>

                    <select id="sigungu" name="sigungu"
                            class="border p-3 rounded-lg w-fulloutline-none">
                        <option value="">시/군/구</option>
                    </select>
                </div>

                <input id="detail-address" name="detail-address" type="text" placeholder="상세주소를 입력해주세요"
                       class="border p-3 rounded-lg w-full outline-none">
            </div>

            <div class="form-group">
                <label for="message">문의내용<span class="text-red-700 pl-0.5">*</span></label>
                <textarea id="message" name="message" rows="4" placeholder="상담 받으실 내용을 간단히 적어주세요."></textarea>
            </div>

            <div class="mt-2 mb-4">
                <div class="flex items-center justify-between p-4 bg-blue-50/30 border border-blue-100 rounded-lg">
                    <div class="flex items-center">
                        <input type="checkbox" id="privacy_agree" name="privacy_agree" required
                               class="w-5 h-5 accent-blue-600 cursor-pointer">
                        <label for="privacy_agree" class="ml-2 text-sm md:text-base font-bold text-gray-800 cursor-pointer">
                            개인정보 수집·이용 동의 <span class="text-orange-600">(필수)</span>
                        </label>
                    </div>
                    <button type="button" onclick="togglePrivacy()" class="text-blue-600 text-sm font-bold border-b border-blue-600 leading-tight">
                        [자세히보기]
                    </button>
                </div>

                <div id="privacy_content" class="hidden mt-2 p-4 bg-gray-50 border rounded-lg text-xs text-gray-600 leading-relaxed max-h-40 overflow-y-auto">
                    <h4 class="font-bold mb-2">[개인정보 수집 및 이용 동의 안내]</h4>
                    <p>1. 수집 항목: 성함, 연락처, 주소, 상담내용</p>
                    <p>2. 수집 목적: 고객 상담 및 서비스 제공, 본인 확인</p>
                    <p>3. 보유 및 이용기간: <strong>상담 완료 후 6개월 보관 후 즉시 파기</strong> (단, 관계 법령에 따라 보존이 필요한 경우 해당 기간까지 보관)</p>
                    <p>4. 동의 거부 권리: 귀하는 개인정보 수집에 동의하지 않을 권리가 있습니다. 단, 거부 시 상담 신청 및 서비스 이용이 제한될 수 있습니다.</p>
                </div>
            </div>

            <button type="submit" class="submit-btn form-group !mb-8">상담 신청하기</button>
        </form>
    </div>
</section>


<script>
    document.getElementById("contact-form").addEventListener("submit", function(e) {
        e.preventDefault();

        const form = e.target;
        const data = new FormData(form);

        fetch("/", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams(data).toString(),
        })
            .then(() => {
                alert("상담 신청이 정상적으로 접수되었습니다. 곧 연락드리겠습니다!");
                form.reset(); // 폼 초기화
                window.location.reload(); // 또는 페이지 새로고침
            })
            .catch((error) => {
                alert("전송 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.");
                print(error);
            });
    });

    function updateSigungu() {
        const sidoSelect = document.getElementById("sido");
        const sigunguSelect = document.getElementById("sigungu");
        const selectedSido = sidoSelect.value;

        sigunguSelect.innerHTML = '<option value="">시/군/구 선택</option>';

        if (selectedSido && areaData[selectedSido]) {
            areaData[selectedSido].forEach(function (city) {
                const option = document.createElement("option");
                option.value = city;
                option.text = city;
                sigunguSelect.add(option);
            });
        }
    }

    function togglePrivacy() {
        const content = document.getElementById('privacy_content');
        if (content.classList.contains('hidden')) {
            content.classList.remove('hidden');
        } else {
            content.classList.add('hidden');
        }
    }
</script>

        margin: 0 auto;

</style>
