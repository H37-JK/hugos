<html lang="ko">
<head>
    <meta charset="utf-8">
</head>

<section class="contact-form-container">
    <div class="contact-card">
        <h3>빠른 상담 예약</h3>
        <p>상담 내용을 남겨주시면 확인 후 즉시 연락드리겠습니다.</p>
        
        <form name="contact" netlify>
            <div class="form-group">
                <label for="name">성함</label>
                <input type="text" id="name" name="name" placeholder="성함을 입력해주세요" required>
            </div>
            
            <div class="form-group">
                <label for="phone">연락처</label>
                <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" required>
            </div>
            
            <div class="form-group">
                <label for="service">문의 서비스</label>
                <select id="service" name="service">
                    <option value="누수탐지">누수탐지</option>
                    <option value="변기/싱크대 막힘">변기/싱크대 막힘</option>
                    <option value="수전/부속 교체">수전/부속 교체</option>
                    <option value="기타">기타 문의</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">상세 내용</label>
                <textarea id="message" name="message" rows="4" placeholder="상담받으실 내용을 간단히 적어주세요"></textarea>
            </div>
            
            <button type="submit" class="submit-btn">상담 신청하기</button>
        </form>
    </div>
</section>

<style>
    .contact-form-container {
        padding: 40px 20px;
        border-radius: 12px;
        margin: 20px 0;
    }
    .contact-card {
        max-width: 500px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
    }
    .contact-card h3 {
        margin-top: 0;
        color: #333;
        font-size: 1.5rem;
        text-align: center;
    }
    .contact-card p {
        color: #666;
        text-align: center;
        margin-bottom: 25px;
        font-size: 0.95rem;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #444;
        font-size: 0.9rem;
    }
    .form-group input, 
    .form-group select, 
    .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        box-sizing: border-box;
    }
    .form-group input:focus, 
    .form-group textarea:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
    }
    .submit-btn {
        width: 100%;
        padding: 15px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s;
    }
    .submit-btn:hover {
        background-color: #0056b3;
    }
</style>
